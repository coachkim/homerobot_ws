ekf_filter_node:
  ros__parameters:
    use_sim_time: true
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # 1. 바퀴 오도메트리 설정 (위치와 선속도만 믿음)
    odom0: /odom
    odom0_config: [false, false, false, # x, y, z 위치
                  false, false, false, # roll, pitch, yaw 각도
                  true,  true,  false, # vx, vy, vz 선속도
                  false, false, true,  # vroll, vpitch, vyaw 각속도
                  false, false, false] # ax, ay, az 가속도

    # 2. IMU 설정 (각속도와 방향만 믿음)
    imu0: /imu
    imu0_config: [false, false, false,
                  false, false, true,  # yaw 각도 (방향)
                  false, false, false,
                  false, false, true,  # vyaw 각속도 (회전 속도)
                  false, false, false]